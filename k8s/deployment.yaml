apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: flask-app
        image: your-dockerhub-username/cloud-native-app:latest
        ports:
        - containerPort: 5000
        - containerPort: 8000
        # Probes for Self-Healing
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
        # Testing Environment Variables
        env:
        - name: APP_MESSAGE
          value: "Hello from Kubernetes Production!"
