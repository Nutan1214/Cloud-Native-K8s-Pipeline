name: Cloud Native CI
on: [push] # This triggers the pipeline every time you save code

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Test
        run: |
          # This simulates the testing stage in your synopsis
          python -m compileall app.py 

      - name: Build Docker Image
        run: docker build -t my-flask-app:latest .
